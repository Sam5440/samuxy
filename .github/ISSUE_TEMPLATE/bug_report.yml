name: Bug Report
description: Report a bug in samuxy
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Humans only:** write this issue in your own words. AI-generated text is not allowed and will be closed without review.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open samuxy
        2. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: samuxy Version
      placeholder: e.g. 1.0
    validations:
      required: true

  - type: input
    id: windows
    attributes:
      label: Windows Version
      placeholder: e.g. Windows 11 23H2
    validations:
      required: true

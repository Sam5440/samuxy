name: Electron Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test and package
    runs-on: windows-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: electron
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Windows Electron verification
        run: npm run ci:windows

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: samuxy-windows
          path: |
            electron/release/samuxy-*-x64.exe
            electron/release/samuxy-*-x64.exe.blockmap
            electron/release/latest.yml
